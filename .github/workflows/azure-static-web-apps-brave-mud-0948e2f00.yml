name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - feature/warehouse-stock
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Print Triggered Branch
        run: echo "Workflow triggered by branch - ${{ github.ref }}"
      - name: Print checked out branch
        run: git branch --show-current
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_MUD_0948E2F00 }}
          action: "upload"
          app_location: "/docs" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "" # Built app content directory - optional (empty for static HTML)
          github_id_token: ${{ steps.idtoken.outputs.result }}
          production_branch: "feature/warehouse-stock"
          ###### End of Repository/Build Configurations ######